<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendGuard - MVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui; }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">SpendGuard</h1>
      <div class="space-x-6">
        <a href="#" onclick="showScreen('landing')" class="hover:text-indigo-600">Главная</a>
        <a href="#" onclick="showScreen('form')" class="hover:text-indigo-600">Ввод данных</a>
        <a href="#" onclick="showScreen('dashboard')" class="hover:text-indigo-600">Рекомендации</a>
      </div>
    </div>
  </nav>

  <!-- Landing -->
  <div id="landing" class="screen max-w-4xl mx-auto p-8">
    <h2 class="text-5xl font-bold text-center mt-20">Экономьте с умом</h2>
    <p class="text-xl text-center mt-6 text-gray-600">ИИ-помощник для накоплений и контроля расходов</p>
    <div class="text-center mt-12">
      <button onclick="showScreen('form')" class="bg-indigo-600 text-white px-10 py-4 rounded-xl text-xl font-medium hover:bg-indigo-700">Начать бесплатно</button>
    </div>
  </div>

  <!-- Форма ввода данных -->
  <div id="form" class="screen hidden max-w-2xl mx-auto p-8 bg-white rounded-2xl shadow mt-8">
    <h2 class="text-3xl font-bold mb-8">Расскажите о себе и целях</h2>
    <form id="dataForm" class="space-y-6">
      <input type="text" id="name" placeholder="Ваше имя" class="w-full p-4 border rounded-xl" required>
      <input type="email" id="email" placeholder="Email" class="w-full p-4 border rounded-xl" required>
      <input type="number" id="income" placeholder="Месячный доход (руб)" class="w-full p-4 border rounded-xl" required>
      <input type="text" id="goal" placeholder="Цель накопления (например, Отпуск)" class="w-full p-4 border rounded-xl" required>
      <input type="number" id="target" placeholder="Целевая сумма" class="w-full p-4 border rounded-xl" required>
      <input type="date" id="deadline" class="w-full p-4 border rounded-xl" required>
      <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl text-lg font-medium">Получить рекомендации</button>
    </form>
  </div>

  <!-- Dashboard / Рекомендации -->
  <div id="dashboard" class="screen hidden max-w-4xl mx-auto p-8">
    <h2 class="text-3xl font-bold mb-8">Ваши рекомендации</h2>
    <div id="recommendations" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <button onclick="clearData()" class="mt-8 text-red-500">Очистить данные</button>
  </div>

  <script>
    let userData = JSON.parse(localStorage.getItem('spendguard_data')) || [];

    function showScreen(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(screen).classList.remove('hidden');
      if (screen === 'dashboard') renderDashboard();
    }

    document.getElementById('dataForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        id: Date.now(),
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        income: parseInt(document.getElementById('income').value),
        goal: document.getElementById('goal').value,
        target: parseInt(document.getElementById('target').value),
        deadline: document.getElementById('deadline').value
      };
      userData.push(data);
      localStorage.setItem('spendguard_data', JSON.stringify(userData));
      alert('Данные сохранены! Переходим к рекомендациям.');
      showScreen('dashboard');
    });

    function renderDashboard() {
      const container = document.getElementById('recommendations');
      container.innerHTML = '';
      if (userData.length === 0) {
        container.innerHTML = `<p class="col-span-2 text-center text-gray-500">Заполните форму для рекомендаций</p>`;
        return;
      }
      userData.forEach(user => {
        const div = document.createElement('div');
        div.className = "bg-white p-6 rounded-2xl shadow";
        div.innerHTML = `
          <h3 class="font-semibold text-xl">${user.name}</h3>
          <p class="text-emerald-600 mt-2">Цель: ${user.goal} — ${user.target} ₽</p>
          <p class="mt-4">Рекомендация: Откладывайте 15% дохода ежемесячно. Это позволит достичь цели к ${user.deadline}.</p>
        `;
        container.appendChild(div);
      });
    }

    function clearData() {
      if (confirm('Очистить все данные?')) {
        localStorage.removeItem('spendguard_data');
        userData = [];
        renderDashboard();
      }
    }

    // Start on landing
    showScreen('landing');
  </script>
</body>
</html>
